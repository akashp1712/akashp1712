<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480">
  <rect width="1600" height="480" fill="#f8fafc"/>
  <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.4" fill="#e2e8f0"/>
  </pattern>
  <rect width="1600" height="480" fill="url(#dots)"/>

  <!-- ── Streaming: streamText → tokens → onChunk → SSE → client ── -->

  <!-- streamText box -->
  <rect x="52" y="188" width="230" height="104" rx="12" fill="#0f172a"/>
  <text x="167" y="218" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">streamText(</text>
  <text x="167" y="236" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  model,</text>
  <text x="167" y="254" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  messages</text>
  <text x="167" y="284" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">)</text>

  <!-- Stream pipe -->
  <line x1="282" y1="240" x2="360" y2="240" stroke="#0f172a" stroke-width="2.5"/>

  <!-- Token bubbles -->
  <rect x="362" y="220" width="74" height="40" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="399" y="245" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">"The"</text>

  <rect x="448" y="220" width="74" height="40" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="485" y="245" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">" an"</text>

  <rect x="534" y="220" width="80" height="40" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="574" y="245" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">"swer"</text>

  <rect x="626" y="220" width="56" height="40" rx="20" fill="#f8fafc" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="6 3" opacity="0.5"/>
  <text x="654" y="245" font-family="ui-monospace,monospace" font-size="13" fill="#94a3b8" text-anchor="middle">…</text>

  <!-- Connector to onChunk -->
  <line x1="682" y1="240" x2="760" y2="240" stroke="#0f172a" stroke-width="2.5"/>
  <path d="M 752,233 L 768,240 L 752,247" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- onChunk handler box -->
  <rect x="770" y="183" width="280" height="114" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="910" y="210" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">onChunk:</text>
  <text x="910" y="228" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">({ chunk }) =&gt; {</text>
  <text x="910" y="246" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  stream.write(</text>
  <text x="910" y="264" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">    chunk.delta</text>
  <text x="910" y="290" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">)}</text>

  <!-- Arrow to client -->
  <line x1="1050" y1="240" x2="1140" y2="240" stroke="#0f172a" stroke-width="2.5"/>
  <path d="M 1132,233 L 1148,240 L 1132,247" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- SSE pill label above arrow -->
  <rect x="1070" y="207" width="60" height="26" rx="8" fill="#0f172a"/>
  <text x="1100" y="225" font-family="ui-monospace,monospace" font-size="11" fill="#f8fafc" text-anchor="middle">SSE</text>

  <!-- Client box -->
  <rect x="1150" y="183" width="260" height="114" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="1280" y="210" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">&lt;Markdown</text>
  <text x="1280" y="228" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  content=</text>
  <text x="1280" y="246" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  {streamedText}</text>
  <text x="1280" y="264" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  streaming={true}</text>
  <text x="1280" y="290" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">/&gt;</text>

  <text x="52" y="50" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.18em" font-weight="700">MASTRA · STREAMING</text>
</svg>
