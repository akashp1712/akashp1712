<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480">
  <rect width="1600" height="480" fill="#f8fafc"/>
  <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.4" fill="#e2e8f0"/>
  </pattern>
  <rect width="1600" height="480" fill="url(#dots)"/>

  <!-- Evals pipeline: agent response → scorers → metrics dashboard -->
  <g transform="translate(100,244)">

    <!-- Agent output -->
    <rect x="0" y="-52" width="210" height="104" rx="12" fill="#0f172a"/>
    <text x="105" y="-22" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">agent.generate(</text>
    <text x="105" y="-4"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  testMessages</text>
    <text x="105" y="14"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">)</text>
    <text x="105" y="40"  font-family="ui-monospace,monospace" font-size="11" fill="#64748b" text-anchor="middle">// 50 eval cases</text>

    <line x1="210" y1="0" x2="280" y2="0" stroke="#0f172a" stroke-width="2"/>
    <path d="M 273,-7 L 288,0 L 273,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

    <!-- Scorer 1 -->
    <rect x="290" y="-130" width="200" height="80" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="390" y="-106" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">AnswerRelevancy</text>
    <text x="390" y="-88"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">Scorer</text>
    <text x="390" y="-68"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">model-graded</text>

    <!-- Scorer 2 -->
    <rect x="290" y="-34" width="200" height="68" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="390" y="-10" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">ToxicityScorer</text>
    <text x="390" y="10"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">deterministic</text>
    <text x="390" y="28"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">regex + rules</text>

    <!-- Scorer 3 -->
    <rect x="290" y="56" width="200" height="68" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="390" y="80"  font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">FaithfulScorer</text>
    <text x="390" y="100" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">context-check</text>
    <text x="390" y="118" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">embeddings</text>

    <!-- Fan-out lines from arrow to scorers -->
    <line x1="288" y1="0" x2="288" y2="-90" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="288" y1="-90" x2="290" y2="-90" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="288" y1="0" x2="288" y2="90" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="288" y1="90" x2="290" y2="90" stroke="#0f172a" stroke-width="1.5"/>

    <!-- Fan-in to results -->
    <line x1="490" y1="-90" x2="560" y2="-90" stroke="#0f172a" stroke-width="1.5"/>
    <line x1="560" y1="-90" x2="560" y2="0"   stroke="#0f172a" stroke-width="1.5"/>
    <line x1="490" y1="0"   x2="560" y2="0"   stroke="#0f172a" stroke-width="1.5"/>
    <line x1="490" y1="90"  x2="560" y2="90"  stroke="#0f172a" stroke-width="1.5"/>
    <line x1="560" y1="90"  x2="560" y2="0"   stroke="#0f172a" stroke-width="1.5"/>
    <line x1="560" y1="0"   x2="620" y2="0"   stroke="#0f172a" stroke-width="1.5"/>
    <path d="M 613,-7 L 628,0 L 613,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

    <!-- Scores dashboard -->
    <rect x="630" y="-80" width="220" height="160" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="740" y="-56" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">evalResult.scores</text>

    <!-- Score bars -->
    <rect x="650" y="-40" width="170" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="650" y="-40" width="146" height="16" rx="4" fill="#0f172a" opacity="0.85"/>
    <text x="830" y="-27" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">0.86</text>

    <rect x="650" y="-14" width="170" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="650" y="-14" width="119" height="16" rx="4" fill="#0f172a" opacity="0.55"/>
    <text x="830" y="-1"  font-family="ui-monospace,monospace" font-size="11" fill="#64748b">0.70</text>

    <rect x="650" y="12" width="170" height="16" rx="4" fill="#e2e8f0"/>
    <rect x="650" y="12" width="158" height="16" rx="4" fill="#0f172a" opacity="0.92"/>
    <text x="830" y="25"  font-family="ui-monospace,monospace" font-size="11" fill="#64748b">0.93</text>

    <text x="740" y="58"  font-family="ui-monospace,monospace" font-size="11" fill="#64748b" text-anchor="middle">PASS threshold: 0.7</text>

    <!-- CI gate -->
    <line x1="850" y1="0" x2="940" y2="0" stroke="#0f172a" stroke-width="2"/>
    <path d="M 932,-7 L 948,0 L 932,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>
    <rect x="950" y="-44" width="180" height="88" rx="12" fill="#0f172a"/>
    <text x="1040" y="-18" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc" text-anchor="middle">CI gate</text>
    <text x="1040" y="2"   font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">score ≥ 0.7</text>
    <text x="1040" y="20"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">→ ✓ deploy</text>
    <text x="1040" y="38"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">else → ✗ block</text>

  </g>

  <text x="52" y="50" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.18em" font-weight="700">MASTRA · EVALS</text>
</svg>
