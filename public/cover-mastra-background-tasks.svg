<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480">
  <rect width="1600" height="480" fill="#f8fafc"/>
  <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.4" fill="#e2e8f0"/>
  </pattern>
  <rect width="1600" height="480" fill="url(#dots)"/>

  <g transform="translate(100,244)">

    <!-- Tool with backgroundTasks: true -->
    <rect x="0" y="-70" width="280" height="140" rx="12" fill="#0f172a"/>
    <text x="140" y="-44" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">createTool({</text>
    <text x="140" y="-24" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  id: 'scrape',</text>
    <text x="140" y="-6"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  backgroundTasks:</text>
    <text x="140" y="14"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">    { enabled: true },</text>
    <text x="140" y="34"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  execute: async…</text>
    <text x="140" y="58"  font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">})</text>

    <!-- Arrow -->
    <line x1="280" y1="0" x2="360" y2="0" stroke="#0f172a" stroke-width="2"/>
    <path d="M 353,-7 L 368,0 L 353,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

    <!-- Background queue -->
    <rect x="370" y="-70" width="220" height="140" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="480" y="-44" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">Background Queue</text>
    <!-- Queue items -->
    <rect x="390" y="-28" width="180" height="22" rx="4" fill="#e2e8f0"/>
    <text x="480" y="-12" font-family="ui-monospace,monospace" font-size="11" fill="#475569" text-anchor="middle">job:fetch-page-1 ⟳</text>
    <rect x="390" y="-2" width="180" height="22" rx="4" fill="#e2e8f0"/>
    <text x="480" y="14"  font-family="ui-monospace,monospace" font-size="11" fill="#475569" text-anchor="middle">job:fetch-page-2 ⟳</text>
    <rect x="390" y="24"  width="180" height="22" rx="4" fill="#0f172a" opacity="0.15"/>
    <text x="480" y="40"  font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8" text-anchor="middle">job:fetch-page-3 …</text>
    <text x="480" y="66"  font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8" text-anchor="middle">persisted across restart</text>

    <!-- Arrow  -->
    <line x1="590" y1="0" x2="670" y2="0" stroke="#0f172a" stroke-width="2"/>
    <path d="M 663,-7 L 678,0 L 663,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

    <!-- Heartbeat / schedule -->
    <rect x="680" y="-60" width="220" height="120" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="790" y="-36" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">mastra.schedules</text>
    <text x="790" y="-18" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">.create({</text>
    <text x="790" y="0"   font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  cron:'*/5 * * *',</text>
    <text x="790" y="18"  font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  agent: 'scraper'</text>
    <text x="790" y="42"  font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">})</text>

    <!-- Arrow -->
    <line x1="900" y1="0" x2="980" y2="0" stroke="#0f172a" stroke-width="2"/>
    <path d="M 973,-7 L 988,0 L 973,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

    <!-- Heartbeat signal wave -->
    <rect x="990" y="-60" width="220" height="120" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
    <text x="1100" y="-36" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">onHeartbeat:</text>
    <polyline points="1020,10 1040,-20 1060,10 1080,-30 1100,10 1120,-10 1140,10 1160,0 1180,10 1200,10" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>
    <text x="1100" y="52" font-family="ui-monospace,monospace" font-size="11" fill="#64748b" text-anchor="middle">alive signal</text>

    <!-- Arrow -->
    <line x1="1210" y1="0" x2="1290" y2="0" stroke="#0f172a" stroke-width="2"/>
    <path d="M 1283,-7 L 1298,0 L 1283,7" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

    <!-- Result -->
    <rect x="1300" y="-52" width="200" height="104" rx="12" fill="#0f172a"/>
    <text x="1400" y="-24" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">results</text>
    <text x="1400" y="-4"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">persisted</text>
    <text x="1400" y="16"  font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">crash-safe</text>
    <text x="1400" y="36"  font-family="ui-monospace,monospace" font-size="11" fill="#64748b" text-anchor="middle">✓ survives redeploy</text>

  </g>

  <text x="52" y="50" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.18em" font-weight="700">MASTRA · BACKGROUND TASKS</text>
</svg>
