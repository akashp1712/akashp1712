<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#f8fafc"/>
  <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.4" fill="#e2e8f0"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <text x="48" y="54" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.18em" font-weight="700">CONTEXT / MEMORY</text>

  <!-- Left panel -->
  <text x="290" y="118" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="0.12em">FULL TOOL OUTPUT</text>
  <rect x="48" y="132" width="484" height="390" rx="14" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="68" y="172" font-family="ui-monospace,monospace" font-size="12" fill="#991b1b">tool_result: searchDocs()</text>
  <text x="68" y="204" font-family="ui-monospace,monospace" font-size="11" fill="#b91c1c">{ "pages": [</text>
  <text x="88" y="228" font-family="ui-monospace,monospace" font-size="11" fill="#dc2626">  { "id": 1, "body": "40KB..." },</text>
  <text x="88" y="252" font-family="ui-monospace,monospace" font-size="11" fill="#dc2626">  { "id": 2, "body": "40KB..." },</text>
  <text x="88" y="276" font-family="ui-monospace,monospace" font-size="11" fill="#dc2626">  ... x12 pages ...</text>
  <text x="68" y="300" font-family="ui-monospace,monospace" font-size="11" fill="#b91c1c">] }</text>
  <text x="68" y="360" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#991b1b">re-read every turn</text>
  <text x="68" y="386" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#b91c1c">OOM risk / stale detail</text>
  <text x="68" y="430" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8">~12,000 tokens in history</text>

  <!-- VS -->
  <rect x="562" y="300" width="76" height="44" rx="10" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="600" y="328" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="0.12em">VS</text>

  <!-- Right panel -->
  <text x="910" y="118" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="0.12em">BREADCRUMB</text>
  <rect x="668" y="132" width="484" height="390" rx="14" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="688" y="172" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a">tool_result: searchDocs()</text>
  <text x="688" y="210" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">call: searchDocs({ query: "refund" })</text>
  <text x="688" y="238" font-family="ui-monospace,monospace" font-size="11" fill="#64748b">stored: doc-store/7f3a9c</text>
  <text x="688" y="266" font-family="ui-monospace,monospace" font-size="11" fill="#0f172a">summary: Returns within 30 days...</text>
  <text x="688" y="294" font-family="ui-monospace,monospace" font-size="11" fill="#94a3b8">fetchDoc(id) for full text</text>
  <text x="688" y="360" font-family="ui-sans-serif,system-ui,sans-serif" font-size="14" fill="#0f172a">signature + pointer + summary</text>
  <text x="688" y="386" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#64748b">payload lives outside the thread</text>
  <text x="688" y="430" font-family="ui-monospace,monospace" font-size="12" fill="#64748b">~45 tokens in history</text>
</svg>
