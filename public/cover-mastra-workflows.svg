<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480">
  <rect width="1600" height="480" fill="#f8fafc"/>
  <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.4" fill="#e2e8f0"/>
  </pattern>
  <rect width="1600" height="480" fill="url(#dots)"/>

  <!-- ── Workflows: left to right pipeline ── -->

  <!-- 1. createWorkflow -->
  <rect x="52" y="196" width="222" height="88" rx="12" fill="#0f172a"/>
  <text x="163" y="224" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">createWorkflow(</text>
  <text x="163" y="242" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  'pipeline',</text>
  <text x="163" y="258" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  { schema }</text>
  <text x="163" y="276" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">)</text>

  <!-- Arrow 1→2 -->
  <line x1="274" y1="240" x2="334" y2="240" stroke="#0f172a" stroke-width="2"/>
  <path d="M 327,233 L 342,240 L 327,247" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- 2. .step() – branch node -->
  <rect x="344" y="200" width="200" height="80" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="444" y="230" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">.step(</text>
  <text x="444" y="248" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  'fetch',</text>
  <text x="444" y="266" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">  fetchAgent)</text>

  <!-- Branch fork from right edge of step2 -->
  <line x1="544" y1="228" x2="624" y2="228" stroke="#0f172a" stroke-width="2"/>
  <line x1="624" y1="228" x2="624" y2="120" stroke="#0f172a" stroke-width="2"/>
  <line x1="624" y1="228" x2="624" y2="360" stroke="#0f172a" stroke-width="2"/>

  <!-- Branch A top -->
  <line x1="624" y1="120" x2="680" y2="120" stroke="#0f172a" stroke-width="2"/>
  <rect x="680" y="76" width="190" height="88" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="775" y="106" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">.branch(</text>
  <text x="775" y="124" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  if: 'success'</text>
  <text x="775" y="156" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">)</text>

  <!-- Branch B bottom -->
  <line x1="624" y1="360" x2="680" y2="360" stroke="#0f172a" stroke-width="2"/>
  <rect x="680" y="316" width="190" height="88" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="775" y="346" font-family="ui-monospace,monospace" font-size="12" fill="#0f172a" text-anchor="middle">.branch(</text>
  <text x="775" y="364" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  if: 'retry'</text>
  <text x="775" y="396" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">)</text>

  <!-- Merge lines from A and B into .then() -->
  <line x1="870" y1="120" x2="950" y2="120" stroke="#0f172a" stroke-width="2"/>
  <line x1="950" y1="120" x2="950" y2="240" stroke="#0f172a" stroke-width="2"/>
  <line x1="870" y1="360" x2="950" y2="360" stroke="#0f172a" stroke-width="2"/>
  <line x1="950" y1="360" x2="950" y2="240" stroke="#0f172a" stroke-width="2"/>
  <line x1="950" y1="240" x2="1010" y2="240" stroke="#0f172a" stroke-width="2"/>
  <path d="M 1003,233 L 1018,240 L 1003,247" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- .then().commit() -->
  <rect x="1020" y="196" width="220" height="88" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="1130" y="224" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">.then(</text>
  <text x="1130" y="242" font-family="ui-monospace,monospace" font-size="12" fill="#64748b" text-anchor="middle">  summarizeAgent</text>
  <text x="1130" y="276" font-family="ui-monospace,monospace" font-size="13" fill="#0f172a" text-anchor="middle">).commit()</text>

  <!-- Arrow to .execute() -->
  <line x1="1240" y1="240" x2="1310" y2="240" stroke="#0f172a" stroke-width="2"/>
  <path d="M 1302,233 L 1318,240 L 1302,247" fill="none" stroke="#0f172a" stroke-width="2" stroke-linejoin="round"/>

  <!-- .execute() -->
  <rect x="1320" y="196" width="232" height="88" rx="12" fill="#0f172a"/>
  <text x="1436" y="224" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">wf.execute(</text>
  <text x="1436" y="242" font-family="ui-monospace,monospace" font-size="12" fill="#94a3b8" text-anchor="middle">  { triggerData }</text>
  <text x="1436" y="276" font-family="ui-monospace,monospace" font-size="13" fill="#f8fafc"  text-anchor="middle">)</text>

  <text x="52" y="50" font-family="ui-sans-serif,system-ui,sans-serif" font-size="11" fill="#cbd5e1" letter-spacing="0.18em" font-weight="700">MASTRA · WORKFLOWS</text>
</svg>
